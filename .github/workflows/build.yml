name: Build box extension

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: patch

      - name: Clone Yuzono extensions source
        run: git clone --depth 1 https://github.com/yuzono/anime-extensions.git source

      - name: Decode signing keystore
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > source/signingkey.jks
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

      - name: Apply box extension
        run: |
          cp -r patch/src/all/box source/src/all/box
          cp patch/settings.gradle.kts source/settings.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: source
          cache-disabled: true

      - name: Apply spotless formatting
        run: ./gradlew spotlessApply
        working-directory: source

      - name: Debug Box.kt after spotless
        run: |
          cat -n source/src/all/box/src/eu/kanade/tachiyomi/animeextension/all/box/Box.kt | sed -n '160,200p'

      - name: Build box extension
        run: ./gradlew :src:all:box:assembleRelease --stacktrace
        working-directory: source

      - name: Prepare repo artifacts
        run: |
          mkdir -p patch/repo/apk
          APK_PATH=$(find source/src/all/box/build/outputs/apk -name '*.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then echo "APK not found"; ls -R source/src/all/box/build/outputs/apk; exit 1; fi
          APK_NAME=$(basename "$APK_PATH")
          echo "Found APK: $APK_NAME"
          cp "$APK_PATH" "patch/repo/apk/$APK_NAME"
          python3 - "$APK_NAME" << 'PY'
          import json, re, sys
          apk_name = sys.argv[1]
          with open("source/src/all/box/build.gradle", encoding="utf-8") as f:
              text = f.read()
          code = int(re.search(r"extVersionCode\s*=\s*(\d+)", text).group(1))
          version = f"14.{code}"
          index = [{
              "name": "Aniyomi: box",
              "pkg": "eu.kanade.tachiyomi.animeextension.all.box",
              "apk": apk_name,
              "lang": "all",
              "code": code,
              "version": version,
              "nsfw": 0,
              "sources": [{
                  "name": "box",
                  "lang": "all",
                  "id": "9134775860771942682",
                  "baseUrl": "",
                  "versionId": code
              }]
          }]
          with open("patch/repo/index.min.json", "w", encoding="utf-8") as f:
              json.dump(index, f, separators=(",", ":"))
          repo_json = {
              "meta": {
                  "name": "Box Yuzono",
                  "shortName": "Box Yuzono",
                  "website": "https://github.com/pepe1784/Box-yuzono",
                  "signingKeyFingerprint": "6d97a5e3c0638021cd7ae89fb609314895430e4121cb44c62d0a2f57806c4bed"
              }
          }
          with open("patch/repo/repo.json", "w", encoding="utf-8") as f:
              json.dump(repo_json, f, separators=(",", ":"))
          print("Generated index.min.json and repo.json for", apk_name)
          PY

      - name: Deploy to repo branch
        run: |
          mkdir -p /tmp/repo-deploy
          cp -r patch/repo/. /tmp/repo-deploy/
          cd /tmp/repo-deploy
          git init
          git checkout -b repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update repo"
          git push -f https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo
